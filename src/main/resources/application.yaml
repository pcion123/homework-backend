spring:
  application:
    name: demo
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/taskdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: taskuser
    password: taskpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379

server:
  port: 8080

# define redis properties here

rocketmq:
  name-server: 127.0.0.1:9876
  create-topic-key: TBW102
  producer:
    group: task-schedule-producer-group
    send-timeout: 10000
    vip-channel-enabled: false
  task-topic: task-schedule-topic
  message:
    source-ip: 127.0.0.1
    version: 1.0.0

task-job:
  check-fixed-delay: 5000
  check-batch-size: 100
  lock-timeout: 30000